version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: rag_postgres

    restart: always

    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: